<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ТСН АвтоРеклама</title>
  <style>
    body {
      width: 250px;
      margin: 0;
      padding: 16px;
      background: #111111;
      color: #e0e0e0;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    h2 {
      margin: 0 0 16px 0;
      font-size: 15px;
      color: #ffffff;
      display: flex;
      align-items: center;
      letter-spacing: 0.5px;
    }
    .badge {
      background: #c91c1c;
      color: #ffffff;
      padding: 3px 6px;
      border-radius: 4px;
      margin-right: 8px;
      font-size: 12px;
      font-weight: 900;
    }
    .option {
      display: flex;
      align-items: center;
      margin: 12px 0;
      padding: 10px;
      background: #222222;
      border-radius: 6px;
      border: 1px solid #333333;
    }
    .option label {
      display: flex;
      align-items: center;
      cursor: pointer;
      width: 100%;
      font-weight: 500;
      color: #cccccc;
    }
    .option label:hover {
      color: #ffffff;
    }
    .option input {
      margin-right: 10px;
      accent-color: #c91c1c;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #c91c1c;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      margin-top: 12px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #e62020;
    }
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      color: #555555;
    }
  </style>
</head>
<body>
  <h2><span class="badge">ТСН</span> АВТОРЕКЛАМА</h2>
  
  <div class="option">
    <label title="Якщо вимкнено, панель не буде вилітати автоматично при відкритті редактора">
      <input type="checkbox" id="auto-open-cb">
      Авто-відкриття панелі
    </label>
  </div>

  <button class="btn" id="force-open-btn">⚡ Відкрити на сторінці</button>

  <div class="footer">v1.1.5</div>
  
  <script src="popup.js"></script>
</body>
</html>
